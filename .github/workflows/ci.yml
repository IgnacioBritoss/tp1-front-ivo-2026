name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run Vitest
        run: npm run test

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://ci:ci@ci.invalid/ci
          AUTH_SECRET: ci-secret-for-testing-at-least-32-chars
          GOOGLE_CLIENT_ID: fake-client-id
          GOOGLE_CLIENT_SECRET: fake-client-secret

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build with Astro
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@ci.invalid/ci
          AUTH_SECRET: ci-secret-for-testing-at-least-32-chars
          GOOGLE_CLIENT_ID: fake-client-id
          GOOGLE_CLIENT_SECRET: fake-client-secret
